
{% extends 'base.html' %}
{% block content %}

<h3>Novo Produto</h3>

<div class="card-custom">
    <form method="post">
        {% csrf_token %}

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Nome</label>
                <input type="text" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Preço</label>
                <input type="text" class="form-control">
            </div>
        </div>

        <button class="btn btn-success">Salvar</button>
    </form>
</div>

{% endblock %}
